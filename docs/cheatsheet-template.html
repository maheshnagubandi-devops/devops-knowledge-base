<!doctype html>
<!--
  Reusable cheatsheet HTML template.
  Single source of truth: keep content in the corresponding Markdown file (e.g. shell-scripting/cheat-sheet.md).
  Use the conversion script `scripts/generate_cheatsheets.sh` to create templated HTML files.
  NOTE: The generator will NEVER overwrite an existing HTML file. To force regeneration,
  delete the target HTML first (for example: `rm site/docker/docker-cheatsheet.html`) and
  re-run the generator.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{TITLE}</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#fff;--muted:#566;--accent:#0969da}
    html,body{margin:0;padding:0;background:var(--bg);color:#111;font-family:Inter,system-ui,Helvetica,Arial,sans-serif}
    /* slightly smaller base font for compact printing */
    body{font-size:9px;line-height:1.25}
    .wrap{max-width:1120px;margin:6px auto;padding:8px}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    h1{font-family:JetBrains Mono,monospace;font-size:16px;margin:0}
    .subtitle{font-size:10px;color:var(--muted)}
    /* tighter grid to reduce pages */
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
    .card{background:#fbfcfd;border:1px solid #e6eef6;padding:5px;border-radius:6px}
    .card h3{font-size:10px;margin:0 0 3px}
    pre,code{font-family:JetBrains Mono,monospace;font-size:9px}
    .code-block{background:#0f172a;color:#fff;padding:5px;border-radius:6px;font-size:8.5px;overflow:auto}
    /* footer fixed on each printed page */
    .page-footer{position:fixed;left:8px;right:8px;bottom:6px;font-size:8px;color:#556;display:flex;justify-content:space-between}
    .page-footer .credit{font-weight:600}
    @media print{
      body{font-size:9px}
      .wrap{padding:6px}
      .grid{gap:3px}
      .card{padding:4px}
      .page-footer{position:fixed;left:6mm;right:6mm;bottom:4mm}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>{TITLE}</h1>
        <div class="subtitle">{SUBTITLE}</div>
      </div>
      <div class="meta">Generated from Markdown</div>
    </header>
    <main id="content">{CONTENT}</main>
    <div class="page-footer">
      <div class="credit">Created by Nagubandi Mahesh</div>
      <div class="pageinfo">Generated from Markdown</div>
    </div>
  </div>
</body>
</html>
