name: Deploy Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Prepare site (templated conversion)
        run: |
          mkdir -p site
          cp docs/index.html site/
          # Use helper script to convert markdown cheatsheets into templated HTML
          chmod +x scripts/generate_cheatsheets.sh
          ./scripts/generate_cheatsheets.sh . site
          # Copy any existing HTML files (other resources)
          find . -path './docs' -prune -o -name '*.html' -not -path './docs/*' -exec cp --parents {} site/ \; || true

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5