# Shell Scripting Cheatsheet

## 1. Create and run a shell script

```bash
vi sample.sh
```

Inside `sample.sh`:
```bash
#!/bin/bash
# script content here
```

Save and exit:
```bash
Esc :wq!
```

Make it executable:
```bash
chmod 777 sample.sh
```

Run it:
```bash
./sample.sh
```

---

## 2. Quoting and variables

- Use `echo "$SHELL"` for variables.
- Use no quotes for plain numbers only when safe.
- Prefer quotes for all variables in tests and string output.

Examples:
```bash
echo "$SHELL"
echo "$a"
```

### Dot sourcing

- Use `.` or `source` to execute a shell script in the current shell.
- Example:
```bash
. ./script.sh
source ./script.sh
```

---

## 3. Current shell and shells list

- Check your current shell:
```bash
echo "$SHELL"
```
- Check available shells:
```bash
cat /etc/shells
```
- Change shell:
```bash
chsh
```

---

## 4. File test operators

| Operator | Meaning |
|---|---|
| `-e` | file exists |
| `-f` | regular file |
| `-d` | directory |
| `-s` | file exists and is not empty |
| `-r` | readable |
| `-w` | writable |
| `-x` | executable |
| `-L` | symbolic link |
| `-h` | symbolic link |
| `-l` | hard link check (custom via `find -type f -links`) |
| `-p` | named pipe |
| `-b` | block device |
| `-c` | character device |

---

## 5. Conditional expressions: `[` vs `[[`

### Single bracket `[` 
- Works in portable POSIX shells.
- Always quote variables to avoid syntax errors with spaces or empty values.

Example:
```bash
if [ "$name" = "Admin" ]; then
  echo "match"
fi
```

### Double bracket `[[`
- Bash-only construct.
- Handles empty values and spaces more safely.
- Supports pattern matching and `&&` / `||` without escaping.

Example:
```bash
if [[ $name = "Admin" ]]; then
  echo "match"
fi
```

---

## 6. Infinite loop

```bash
while true; do
  echo "press [ctrl+c] to exit this loop"
  sleep 2
done
```

---

## 7. Cron jobs and shell practice

- `crontab -e` edits scheduled tasks.
- Use shell scripting for repeatable automation tasks.

## 8. Interview-ready script patterns

### Basic script structure
```bash
#!/bin/bash

# first program
echo "devops-basics-shellscripting"
pwd
ls -la
date
df -h
uname -a
```

### Arguments
```bash
#!/bin/bash

echo "hi, I am $1"
echo "I stay at $3"
```

### Variables
```bash
#!/bin/bash

a=$(pwd)
b=$(ls -lrt)
c="This is Mahesh"
echo "$a"
echo "$b"
echo "$c"
```

### Read input
```bash
#!/bin/bash

read -p "Enter your name: " name
echo "hi $name"
read -p "Enter your place: " place
echo "I am from $place"
```

### Special shell variables
```bash
#!/bin/bash

echo "script name: $0"
echo "first arg: $1"
echo "second arg: $2"
echo "arg count: $#"
echo "all args: $*"
echo "array args: $@"
echo "current PID: $$"
echo "last background PID: $!"
echo "last command status: $?"
```

### Arithmetic with `expr`
```bash
sum=$(expr "$1" + "$2")
echo "sum = $sum"
```

### If / else
```bash
if [ "$a" -gt "$b" ]; then
  echo "$a is big"
else
  echo "$b is big"
fi
```

### File / directory / link check
```bash
if [ -L "$name" ]; then
  echo "$name is a symbolic link"
elif [ -d "$name" ]; then
  echo "$name is a directory"
elif [ -f "$name" ]; then
  echo "$name is a file"
else
  echo "$name does not exist"
fi
```

### Loop examples
```bash
# print from n to 1
num=$1
while [ "$num" -gt 0 ]; do
  echo "$num"
  num=$(expr "$num" - 1)
done
```

```bash
# print 1 to 10
for num in {1..10}; do
  echo "$num"
done
```

## 9. Common script safety tips

- Always use `#!/bin/bash` at the top of a Bash script.
- Quote variable expansions inside test expressions: `"$var"`.
- Use `set -euo pipefail` in production scripts for safer execution.
- Use `chmod 755` for executable scripts rather than `chmod 777` when possible.
- Use `./script.sh` to run the local file.

---

## 10. Recommended interview topics

- Shell script creation and execution flow
- Quoting rules and variable expansion
- `if`, `elif`, `else`, and `case`
- `for`, `while`, and infinite loops
- File tests and file types

## 11. Functions

```bash
myfunc() {
  local name="$1"
  echo "Hello $name"
}

myfunc "Mahesh"
```

Use `local` to limit variable scope inside functions.

---

## 12. Arrays

Indexed array:
```bash
arr=(one two three)
echo "${arr[0]}"    # one
echo "${arr[@]}"     # all elements
```

Associative array (bash 4+):
```bash
declare -A amap
amap[name]=Mahesh
echo "${amap[name]}"
```

---

## 13. Parameter expansion

Common forms:
```bash
${var:-default}   # default if var unset or empty
${var:=default}   # assign default
${var#pattern}     # remove shortest prefix
${var##pattern}    # remove longest prefix
${var%pattern}     # remove shortest suffix
${var%%pattern}    # remove longest suffix
${var:offset:length} # substring
```

---

## 14. Here-documents and here-strings

Heredoc:
```bash
cat <<'EOF' > file.txt
Line 1
Line 2
EOF
```

Here-string (single line):
```bash
grep pattern <<< "$string"
```

---

## 15. Redirection, pipes, and command substitution

```bash
cmd > out.txt        # stdout to file (overwrite)
cmd >> out.txt       # append
cmd 2> err.txt       # stderr
cmd &> all.txt       # both stdout and stderr (bash)
cmd | othercmd       # pipe stdout to next command
var=$(cmd)           # capture output
```

Use `tee` to write and view simultaneously: `cmd | tee file.txt`

---

## 16. Shell options for safer scripts

Add at top of scripts:
```bash
set -euo pipefail
# -e: exit on error
# -u: treat unset variables as errors
# -o pipefail: pipeline status is non-zero if any part fails
```

---

## 17. Argument parsing with `getopts`

```bash
while getopts ":u:p:h" opt; do
  case $opt in
    u) user="$OPTARG" ;;
    p) pass="$OPTARG" ;;
    h) echo "help"; exit 0 ;;
    \?) echo "Invalid option: -$OPTARG" ;;
  esac
done
```

---

## 18. Trap and cleanup

```bash
trap 'echo "caught SIGINT"; cleanup; exit 2' INT TERM

cleanup() {
  rm -f /tmp/mytempfile
}
```

---

## 19. Arithmetic

Prefer built-in arithmetic:
```bash
a=3
(( a += 5 ))
echo "$a"   # 8
sum=$(( $1 + $2 ))
```

---

## 20. Pattern matching and regex

```bash
if [[ $str =~ ^[0-9]+$ ]]; then
  echo "number"
fi
```

Access captured groups with `BASH_REMATCH`.

---

## 21. Subshells vs current shell

```bash
( cd /tmp && do_something )  # runs in subshell, cwd unchanged
{ cd /tmp; do_something; }   # runs in current shell (no subshell)
```

Sourcing:
```bash
. ./script.sh   # runs in current shell
```

---

## 22. Exporting environment variables

```bash
export VAR=value
```

Use `env` or `printenv` to verify exported variables.
